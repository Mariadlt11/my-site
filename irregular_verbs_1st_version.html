<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <title>Irregular Verbs</title> <style> body{ font-family: Arial, sans-serif; background-color:#f0f7ff; text-align:center; padding:40px; } h1{ color:#2c4a7a; font-size:40px; } .instructions{ font-size:22px; margin-bottom:15px; } .score{ font-size:22px; margin-bottom:10px; } .progress{ font-size:20px; margin-bottom:25px; color:#444; } .question{ font-size:30px; margin-bottom:30px; } .answers button{ display:block; width:260px; margin:12px auto; padding:16px; font-size:22px; border:none; border-radius:10px; background-color:#cfe8ff; cursor:pointer; } .answers button:hover{ background-color:#a9d4ff; } .feedback{ font-size:24px; margin-top:20px; font-weight:bold; } .nextBtn{ margin-top:25px; padding:14px 28px; font-size:22px; border:none; border-radius:10px; background-color:#7bc47f; color:white; cursor:pointer; } .nextBtn:hover{ background-color:#5ea863; } </style> </head> <body> <h1>Irregular Verbs</h1> <div class="instructions"> Choose the correct past simple form. Do your best! </div> <div class="score"> Score: <span id="score">0</span> </div> <div class="progress"> Verb <span id="current">1</span> of 60 </div> <div id="game"> <div class="question" id="question"></div> <div class="answers"> <button onclick="checkAnswer(0)" id="btn0"></button> <button onclick="checkAnswer(1)" id="btn1"></button> <button onclick="checkAnswer(2)" id="btn2"></button> </div> <div id="feedback" class="feedback"></div> <button class="nextBtn" onclick="nextQuestion()">Next verb</button> </div> <div id="endScreen" style="display:none; font-size:30px; margin-top:40px;"></div> <script> const verbs = [ {base:"go",past:"went"}, {base:"see",past:"saw"}, {base:"eat",past:"ate"}, {base:"take",past:"took"}, {base:"come",past:"came"}, {base:"make",past:"made"}, {base:"find",past:"found"}, {base:"give",past:"gave"}, {base:"get",past:"got"}, {base:"know",past:"knew"}, {base:"think",past:"thought"}, {base:"tell",past:"told"}, {base:"be",past:"was"}, {base:"become",past:"became"}, {base:"begin",past:"began"}, {base:"break",past:"broke"}, {base:"bring",past:"brought"}, {base:"build",past:"built"}, {base:"buy",past:"bought"}, {base:"catch",past:"caught"}, {base:"choose",past:"chose"}, {base:"cut",past:"cut"}, {base:"do",past:"did"}, {base:"draw",past:"drew"}, {base:"drink",past:"drank"}, {base:"drive",past:"drove"}, {base:"fall",past:"fell"}, {base:"feel",past:"felt"}, {base:"fight",past:"fought"}, {base:"fly",past:"flew"}, {base:"forget",past:"forgot"}, {base:"freeze",past:"froze"}, {base:"grow",past:"grew"}, {base:"hang",past:"hung"}, {base:"hear",past:"heard"}, {base:"hide",past:"hid"}, {base:"hold",past:"held"}, {base:"keep",past:"kept"}, {base:"leave",past:"left"}, {base:"lend",past:"lent"}, {base:"lose",past:"lost"}, {base:"meet",past:"met"}, {base:"pay",past:"paid"}, {base:"put",past:"put"}, {base:"read",past:"read"}, {base:"ride",past:"rode"}, {base:"ring",past:"rang"}, {base:"run",past:"ran"}, {base:"say",past:"said"}, {base:"sell",past:"sold"}, {base:"send",past:"sent"}, {base:"shake",past:"shook"}, {base:"shine",past:"shone"}, {base:"shoot",past:"shot"}, {base:"sing",past:"sang"}, {base:"sit",past:"sat"}, {base:"sleep",past:"slept"}, {base:"speak",past:"spoke"}, {base:"spend",past:"spent"}, {base:"stand",past:"stood"} ]; let score=0; let currentIndex=0; let options=[]; let correctIndex=0; function shuffle(array){ for(let i=array.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [array[i],array[j]]=[array[j],array[i]]; } } shuffle(verbs); function generateQuestion(){ const verb=verbs[currentIndex]; document.getElementById("question").innerHTML="Past of <b>"+verb.base+"</b>?"; options=[verb.past]; while(options.length<3){ let randomVerb=verbs[Math.floor(Math.random()*verbs.length)].past; if(!options.includes(randomVerb)){ options.push(randomVerb); } } shuffle(options); correctIndex=options.indexOf(verb.past); for(let i=0;i<3;i++){ document.getElementById("btn"+i).textContent=options[i]; } document.getElementById("feedback").textContent=""; document.getElementById("current").textContent=currentIndex+1; } function checkAnswer(index){ const feedback=document.getElementById("feedback"); if(index===correctIndex){ feedback.textContent="Correct! Great job!"; feedback.style.color="green"; score++; document.getElementById("score").textContent=score; }else{ feedback.textContent="Not quite. Try the next one!"; feedback.style.color="red"; } } function nextQuestion(){ currentIndex++; if(currentIndex>=verbs.length){ document.getElementById("game").style.display="none"; document.getElementById("endScreen").style.display="block"; document.getElementById("endScreen").innerHTML= "🎉 Game finished!<br><br>Your score: "+score+" / 60<br><br>Great effort!"; return; } generateQuestion(); } generateQuestion(); </script> </body> </html>
